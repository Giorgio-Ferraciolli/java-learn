<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Consulta de Municípios</title>
    <meta charset="UTF-8">
</head>
<body>

<h1>Consulta de Municípios (IBGE)</h1>

<form method="get" action="/">
    <input type="text" name="nome" placeholder="Digite o nome..." th:value="${nome}">
    <button type="submit">Buscar</button>
</form>

<br>

<table border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Estado</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="m : ${municipios}">
            <td th:text="${m.id}"></td>
            <td th:text="${m.nome}"></td>
            <td th:text="${m.estado}"></td>
        </tr>
    </tbody>
</table>

</body>
</html>
