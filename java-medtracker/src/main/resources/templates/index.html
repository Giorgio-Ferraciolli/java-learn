<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Medicamentos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f4f9; }
        .app-container { max-width: 500px; margin: 40px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .med-card { border-left: 5px solid #0d6efd; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="app-container">
    <h2 class="text-center mb-4">💊 Meus Medicamentos</h2>

    <form th:action="@{/add}" th:object="${newMedication}" method="post" class="mb-4 p-3 border rounded bg-light">
        <div class="mb-3">
            <label class="form-label">Nome do Remédio</label>
            <input type="text" class="form-control" th:field="*{name}" placeholder="Ex: Paracetamol" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Características (Dosagem/Tipo)</label>
            <input type="text" class="form-control" th:field="*{characteristics}" placeholder="Ex: 500mg - Comprimido">
        </div>
        <div class="mb-3">
            <label class="form-label">Horário de Tomar</label>
            <input type="time" class="form-control" th:field="*{timeToTake}" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Adicionar Medicamento</button>
    </form>

    <h4 class="mb-3">Sua Agenda:</h4>
    <div th:if="${#lists.isEmpty(medications)}">
        <p class="text-muted text-center">Nenhum medicamento registrado ainda.</p>
    </div>
    
    <div th:each="med : ${medications}" class="card med-card">
        <div class="card-body d-flex justify-content-between align-items-center">
            <div>
                <h5 class="card-title mb-1" th:text="${med.name}">Nome</h5>
                <small class="text-muted" th:text="${med.characteristics}">Características</small>
            </div>
            
            <div class="d-flex align-items-center">
                <div class="fs-4 fw-bold text-primary me-3" th:text="${med.timeToTake}">
                    00:00
                </div>
                <a th:href="@{/delete/{id}(id=${med.id})}" class="btn btn-sm btn-outline-danger">Excluir</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
